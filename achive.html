<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>📜 Chat History — Munga & Alice 💕</title>
  <style>
    :root {
      --primary: #f472b6;
      --primary-dark: #ec489a;
      --secondary: #a78bfa;
      --bg-gradient-start: #fdf4ff;
      --bg-gradient-end: #fae8ff;
      --text-dark: #831843;
      --text-muted: #be185d;
      --user-msg-start: #f9a8d4;
      --user-msg-end: #f472b6;
      --ai-msg-bg: #fff0f7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Quicksand', 'Poppins', system-ui, sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      min-height: 100vh;
      padding: 2rem;
    }

    /* Floating decorations */
    body::before {
      content: '💖✨🌸💫🌟🎀📜';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: 28px;
      opacity: 0.06;
      pointer-events: none;
      white-space: pre;
      animation: floatAround 50s linear infinite;
    }

    @keyframes floatAround {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(30px, 30px) rotate(5deg); }
    }

    .archive-container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255, 245, 250, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(236, 72, 153, 0.3);
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--secondary), #c084fc);
      padding: 1.8rem;
      text-align: center;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #ffe4f2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .back-btn:hover {
      background: rgba(244, 114, 182, 0.5);
      transform: scale(1.05);
    }

    .stats-bar {
      background: rgba(255, 235, 245, 0.9);
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      border-bottom: 1px solid rgba(244, 114, 182, 0.2);
    }

    .stat {
      background: white;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .chat-history {
      padding: 2rem;
      max-height: 70vh;
      overflow-y: auto;
    }

    .chat-history::-webkit-scrollbar {
      width: 6px;
    }
    .chat-history::-webkit-scrollbar-track {
      background: #ffe4f0;
      border-radius: 10px;
    }
    .chat-history::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .chat-group {
      margin-bottom: 2rem;
      border-left: 3px solid var(--primary);
      padding-left: 1rem;
    }

    .date-header {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .message-row {
      display: flex;
      margin-bottom: 1rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-bubble {
      max-width: 75%;
      padding: 0.8rem 1.2rem;
      border-radius: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.45;
      word-wrap: break-word;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }

    .user-bubble {
      background: linear-gradient(135deg, var(--user-msg-start), var(--user-msg-end));
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 0.3rem;
    }

    .ai-bubble {
      background: var(--ai-msg-bg);
      border: 1px solid rgba(244, 114, 182, 0.3);
      color: var(--text-dark);
      margin-right: auto;
      border-bottom-left-radius: 0.3rem;
    }

    .timestamp {
      font-size: 0.6rem;
      opacity: 0.6;
      margin-top: 0.3rem;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: rgba(255, 240, 247, 0.8);
      border-top: 1px solid rgba(244, 114, 182, 0.2);
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .chat-history { padding: 1rem; }
      .message-bubble { max-width: 85%; }
      .back-btn { top: 15px; left: 15px; font-size: 0.75rem; padding: 0.3rem 0.8rem; }
      header h1 { font-size: 1.3rem; }
    }

    .flower-divider {
      text-align: center;
      margin: 1rem 0;
      color: var(--primary);
      font-size: 0.8rem;
    }
  </style>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    // Firebase Configuration - SAME as main page
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB2mQNeygEwdWFCnHJnw9wlqHWKmXlfe38",
  authDomain: "taptap-377d9.firebaseapp.com",
  databaseURL: "https://taptap-377d9-default-rtdb.firebaseio.com",
  projectId: "taptap-377d9",
  storageBucket: "taptap-377d9.firebasestorage.app",
  messagingSenderId: "146364410143",
  appId: "1:146364410143:web:3ce902bdcaeb954091682a",
  measurementId: "G-LRJ2TK7CDH"
};
    
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const messagesRef = ref(database, 'chats');
    
    window.firebaseDB = database;
    window.firebaseMessagesRef = messagesRef;
    window.firebaseOnValue = onValue;
    window.firebaseQuery = query;
    window.firebaseOrderByChild = orderByChild;
  </script>
</head>
<body>

<div class="archive-container">
  <header>
    <a href="index.html" class="back-btn">✨ Back to Chat ✨</a>
    <h1>📜 Our Beautiful Journey 📜</h1>
    <p style="color: white; margin-top: 0.5rem; font-size: 0.9rem;">Every word, every laugh, every moment 💕</p>
  </header>

  <div class="stats-bar">
    <span class="stat">🌸 MUNGA & Alice 🌸</span>
    <span class="stat" id="messageCount">Loading...</span>
  </div>

  <div class="chat-history" id="chatHistory">
    <div class="loading">🌸 Loading your beautiful memories... 🌸</div>
  </div>

  <footer>
    💕 Every conversation is a treasure • Forever besties 💕
  </footer>
</div>

<script>
  // Fetch and display all chats from Firebase
  const chatHistoryDiv = document.getElementById('chatHistory');
  const messageCountSpan = document.getElementById('messageCount');
  
  let allMessages = [];
  
  function formatTime(timestamp) {
    if (!timestamp) return '';
    const date = new Date(timestamp);
    return date.toLocaleString('en-US', { 
      month: 'short', 
      day: 'numeric',
      hour: '2-digit', 
      minute: '2-digit',
      hour12: true 
    });
  }
  
  function formatDateGroup(timestamp) {
    if (!timestamp) return 'Unknown Date';
    const date = new Date(timestamp);
    return date.toLocaleDateString('en-US', { 
      weekday: 'long', 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    });
  }
  
  function displayMessages() {
    if (allMessages.length === 0) {
      chatHistoryDiv.innerHTML = `
        <div class="empty-state">
          <h3>🌸 No messages yet 🌸</h3>
          <p>Start a conversation with MUNGA and your beautiful memories will appear here!</p>
          <div class="flower-divider">✨💕✨</div>
        </div>
      `;
      messageCountSpan.textContent = '0 messages';
      return;
    }
    
    // Sort messages by timestamp
    const sortedMessages = [...allMessages].sort((a, b) => a.timestamp - b.timestamp);
    messageCountSpan.textContent = `${sortedMessages.length} messages 💕`;
    
    // Group messages by date
    const groupedMessages = {};
    sortedMessages.forEach(msg => {
      const dateKey = formatDateGroup(msg.timestamp);
      if (!groupedMessages[dateKey]) {
        groupedMessages[dateKey] = [];
      }
      groupedMessages[dateKey].push(msg);
    });
    
    // Render grouped messages
    let html = '';
    for (const [date, messages] of Object.entries(groupedMessages)) {
      html += `
        <div class="chat-group">
          <div class="date-header">🌸 ${date} 🌸</div>
      `;
      
      messages.forEach(msg => {
        const bubbleClass = msg.sender === 'user' ? 'user-bubble' : 'ai-bubble';
        const senderName = msg.sender === 'user' ? 'Alice' : 'MUNGA';
        const timeStr = formatTime(msg.timestamp);
        
        html += `
          <div class="message-row">
            <div class="message-bubble ${bubbleClass}">
              <strong>${senderName}</strong><br>
              ${escapeHtml(msg.text)}
              <span class="timestamp">${timeStr}</span>
            </div>
          </div>
        `;
      });
      
      html += `<div class="flower-divider">✧ ˚₊‧⁺˖♡ ˚₊‧⁺˖✧</div></div>`;
    }
    
    chatHistoryDiv.innerHTML = html;
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  // Load messages from Firebase
  function loadMessages() {
    if (!window.firebaseMessagesRef || !window.firebaseOnValue) {
      chatHistoryDiv.innerHTML = `
        <div class="empty-state">
          <h3>⚠️ Firebase Not Configured</h3>
          <p>Please update the Firebase configuration in both pages with your actual Firebase project details.</p>
        </div>
      `;
      return;
    }
    
    const messagesQuery = window.firebaseQuery(
      window.firebaseMessagesRef,
      window.firebaseOrderByChild('timestamp')
    );
    
    window.firebaseOnValue(messagesQuery, (snapshot) => {
      allMessages = [];
      snapshot.forEach((childSnapshot) => {
        const msg = childSnapshot.val();
        if (msg && msg.text && msg.sender) {
          allMessages.push({
            text: msg.text,
            sender: msg.sender,
            timestamp: msg.timestamp || Date.now(),
            formattedTime: msg.formattedTime
          });
        }
      });
      displayMessages();
    }, (error) => {
      console.error('Error loading messages:', error);
      chatHistoryDiv.innerHTML = `
        <div class="empty-state">
          <h3>💫 Oops! Something went wrong 💫</h3>
          <p>Couldn't load messages. Make sure Firebase is configured correctly.</p>
        </div>
      `;
    });
  }
  
  // Start loading messages
  setTimeout(() => {
    loadMessages();
  }, 500);
</script>
</body>
  </html>
